<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/devon-landing/dashboard/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1F4E3F" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
    <title>Devon — Boshqaruv paneli</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Single Page Apps for GitHub Pages — redirect handoff.
      // MIT License — https://github.com/rafgraph/spa-github-pages
      // Decodes the `/?/path?query` shape written by `public/404.html` back
      // into a clean URL the React Router can route. Must run BEFORE the main
      // module bundle below so the first render sees the rewritten location.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
