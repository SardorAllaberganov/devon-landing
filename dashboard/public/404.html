<!doctype html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Devon</title>
    <script>
      // Single Page Apps for GitHub Pages
      // MIT License — https://github.com/rafgraph/spa-github-pages
      // pathSegmentsToKeep = 2 matches the live URL prefix `/Devon/dashboard/`.
      // If the repo path changes (custom domain, rename), update this AND
      // `dashboard/vite.config.ts`'s `base` AND `dashboard/index.html`'s favicon href.
      var pathSegmentsToKeep = 2;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
